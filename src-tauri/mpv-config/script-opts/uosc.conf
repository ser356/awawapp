# uosc config - awawapp theme
# Colores en formato RRGGBB o RRGGBBAA

# === COLORES AWAWAPP ===
# Foreground (iconos, texto) - cremoso claro
foreground=f5f0ea
foreground_text=f5f0ea

# Background - marrón oscuro de awawapp
background=1a1612
# Con transparencia para overlays
curtain=1a1612cc

# Estados
success=66bb6a
error=ff6b6b

# === COMPORTAMIENTO ===
# Proximity - mostrar elementos cuando el mouse está cerca
autohide=yes
autohide_duration=1000
timeline_persistency=paused,audio

# === TIMELINE/SEEKBAR ===
timeline_style=bar
timeline_line_width=3
timeline_size=40
timeline_size_min=2
timeline_size_max=50
timeline_size_min_fullscreen=0
timeline_size_max_fullscreen=60
# Mostrar rangos en caché (útil para streaming)
timeline_cached_ranges=600000

# === CONTROLES ===
controls=menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,gap,space,speed,space,loop-file,gap,prev,items,next,gap,fullscreen
controls_size=32
controls_size_fullscreen=40
controls_margin=8
controls_spacing=2

# === VOLUMEN ===
volume=right
volume_size=40
volume_size_fullscreen=52
volume_opacity=0.8

# === SPEED ===
speed_step=0.1
speed_step_is_factor=no
speed_persistency=global

# === MENU ===
menu_item_height=36
menu_item_height_fullscreen=50
menu_min_width=260
menu_min_width_fullscreen=360
menu_opacity=0.95

# === TOP BAR ===
top_bar=always
top_bar_size=40
top_bar_size_fullscreen=46
top_bar_controls=yes
top_bar_title=yes

# === UI GENERAL ===
font_bold=yes
ui_scale=1
border_radius=4

# === WINDOW ===
window_controls=auto
