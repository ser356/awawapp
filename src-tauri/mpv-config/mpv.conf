# mpv.conf - awawapp configuration

# === VIDEO OUTPUT ===
vo=gpu-next
hwdec=auto-safe

# === WINDOW ===
# Tamaño inicial
geometry=1280x720
autofit-larger=90%x90%
# Mantener abierto al terminar
keep-open=yes

# === OSD/OSC ===
# Desactivar OSC built-in (usamos uosc)
osc=no
# Desactivar barra de OSD built-in
osd-bar=no
# Nivel de OSD para mensajes
osd-level=1
# Font para mensajes OSD
osd-font='SF Pro Display'
osd-font-size=32
osd-color='#f5f0ea'
osd-border-color='#1a1612'
osd-border-size=2

# === CACHE (para streaming) ===
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=75MiB
# Cache en RAM para mejor streaming
cache-secs=120

# === AUDIO ===
volume=100
volume-max=150

# === SUBTITLES ===
sub-auto=fuzzy
sub-font='SF Pro Display'
sub-font-size=42
sub-color='#f5f0ea'
sub-border-color='#1a1612'
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color='#00000080'

# === SCREENSHOT ===
screenshot-format=png
screenshot-png-compression=7
screenshot-template='%F-%P'

# === MISC ===
# No mostrar logo al inicio
idle=once
