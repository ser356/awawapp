name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: awawapp-linux
          - platform: macos-latest
            artifact-name: awawapp-macos
          - platform: windows-latest
            artifact-name: awawapp-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            mpv \
            libmpv-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install mpv

      - name: Install Windows dependencies
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # Download official mpv build for Windows
          MPV_VERSION="0.39.0"
          MPV_URL="https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20241208/mpv-x86_64-v3-20241208-git-9701b63.7z"
          mkdir -p /tmp/mpv-win
          curl -fsSL "$MPV_URL" -o /tmp/mpv-win/mpv.7z
          7z x /tmp/mpv-win/mpv.7z -o/tmp/mpv-win/extracted
          # Add to PATH so bundle-mpv.sh can find it
          echo "/tmp/mpv-win/extracted" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI sidecar
        shell: bash
        run: bash scripts/build-cli.sh

      - name: Bundle mpv + dylibs + uosc
        shell: bash
        run: bash scripts/bundle-mpv.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "awawapp ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download for your platform.
          releaseDraft: true
          prerelease: false

      - name: Repackage DMG with quarantine fix and README
        if: matrix.platform == 'macos-latest'
        run: bash scripts/package-dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 7
